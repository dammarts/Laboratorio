databases:
  - name: reservas-db
    databaseName: reservas
    user: reservas_user
    plan: free

services:
  - type: web
    name: reservas-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reservas-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: SEED_EMAIL
        sync: false
      - key: SEED_PASSWORD
        sync: false

  - type: web
    name: reservas-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
