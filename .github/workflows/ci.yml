name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Tests y cobertura
  # ─────────────────────────────────────────
  test:
    name: Tests y Cobertura
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: testing
      DATABASE_URL: sqlite:///:memory:
      JWT_SECRET: test-secret-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias del sistema (pymssql)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            freetds-dev gcc g++ unixodbc-dev

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Tests unitarios e integración
        run: |
          pytest tests/ \
            --ignore=tests/load \
            --ignore=tests/stress \
            -v

      - name: Smoke tests
        run: pytest tests/smoke/ -m smoke -v

      - name: Generar reporte de cobertura
        run: |
          pytest tests/ \
            --ignore=tests/load \
            --ignore=tests/stress \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 2 — Lint (solo en PR hacia main)
  # ─────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ruff
        run: pip install ruff

      - name: Verificar backend/app/ con ruff
        run: ruff check backend/app/ --select=E,F,W --ignore=E501
